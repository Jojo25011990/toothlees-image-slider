<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Creative Toothless image slider with GSAP animations and interactive sequences. Vanilla system - HTML, SASS, JS, GSAP"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <!-- End of Google Fonts -->

    <title>Toothless And Image Slider - HTML, SASS, JS, GSAP</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Section 01 -->
    <section class="section section01">
      <div class="wrapper">
        <h1 class="heading__primary">Wrlod Hsi dna Toohlss</h1>
        <p class="description"></p>
      </div>
    </section>
    <!-- End of Section 01 -->

    <!-- Section 02 -->
    <section class="section section02">
      <div class="toothless toothless-01">
        <img src="./toothless.png" alt="Toothless Dragon" />
      </div>

      <div class="toothless toothless-02">
        <img src="./toothless.png" alt="Toothless Dragon" />
      </div>

      <div class="toothless toothless-03">
        <img src="./toothless.png" alt="Toothless Dragon" />
      </div>

      <div class="toothless toothless-04">
        <p class="toothless-04__circle-01 toothless-04__circle"></p>
        <p class="toothless-04__circle-02 toothless-04__circle"></p>
        <p class="toothless-04__circle-03 toothless-04__circle"></p>

        <p class="toothless-04__textbubble">Hi, There!</p>

        <img src="./toothless.png" alt="Toothless Dragon" />
      </div>
    </section>
    <!-- End of Section 02 -->

    <!-- Section 03 -->
    <section class="section section03">
      <div class="overlay"></div>

      <div class="section03__side section03__side-left"></div>
      <div class="section03__side section03__side-right"></div>

      <!-- Container -->
      <div class="section03__container">
        <div class="gooey-wrapper">
          <div class="gooey gooey-ball-1"></div>
          <div class="gooey gooey-ball-2"></div>
          <div class="gooey gooey-ball-3"></div>
          <div class="gooey gooey-ball-4"></div>
        </div>
      </div>
      <!-- End of Container -->
    </section>
    <!-- End of Section 03 -->

    <!-- Section 04 -->
    <section class="section section04">
      <!-- Title -->
      <h2 class="section04__title">
        <span class="section04__title-span">T</span>
        <span class="section04__title-span">o</span>
        <span class="section04__title-span">o</span>
        <span class="section04__title-span">t</span>
        <span class="section04__title-span">h</span>
        <span class="section04__title-span">l</span>
        <span class="section04__title-span">e</span>
        <span class="section04__title-span">s</span>
        <span class="section04__title-span">s</span>
        <span class="section04__title-span">&nbsp;</span>
        <span class="section04__title-span">a</span>
        <span class="section04__title-span">n</span>
        <span class="section04__title-span">d</span>
        <span class="section04__title-span"> &nbsp;</span>
        <span class="section04__title-span">H</span>
        <span class="section04__title-span">i</span>
        <span class="section04__title-span">s</span>
        <span class="section04__title-span">&nbsp;</span>
        <span class="section04__title-span">W</span>
        <span class="section04__title-span">o</span>
        <span class="section04__title-span">r</span>
        <span class="section04__title-span">l</span>
        <span class="section04__title-span">d</span>
      </h2>
      <!-- End of Title -->

      <!-- Slider -->
      <div class="slider" aria-live="polite">
        <div class="slider__container">
          <figure style="--i: 1">
            <img
              src="img/toothless and light fury 01.jpg"
              alt="Toothless and Light Fury together"
            />
            <h2>Dogo</h2>
          </figure>
          <figure style="--i: 2">
            <img
              src="img/toothless and light fury 02.jpg"
              alt="Toothless and Light Fury together"
            />
          </figure>
          <figure style="--i: 3">
            <img src="img/cover-1.jpg" alt="Toothless artwork 01" />
          </figure>
          <figure style="--i: 4">
            <img src="img/cover-4.jpg" alt="Toothless artwork 02" />
          </figure>
          <figure style="--i: 5">
            <img src="img/image-4.jpg" alt="Toothless artwork 03" />
          </figure>
          <figure style="--i: 6">
            <img src="img/image-1.jpg" alt="Toothless artwork 04" />
          </figure>
          <figure style="--i: 7">
            <img src="img/image-2.jpg" alt="Toothless artwork 05" />
          </figure>
          <figure style="--i: 8">
            <img src="img/image-3.jpg" alt="Toothless artwork 06" />
          </figure>
        </div>
      </div>
      <!-- End of Slider -->
    </section>
    <!-- End of Section 04 -->

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"
      integrity="sha512-f6bQMg6nkSRw/xfHw5BCbISe/dJjXrVGfz9BSDwhZtiErHwk7ifbmBEtF9vFW8UNIQPhV2uEFVyI/UHob9r7Cw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/TextPlugin.min.js"
      integrity="sha512-cxH9rbrf9TrOfYMunxS2cLhFg/hIFJP9/d8SdBT1To+D5BHf6XcYN6PGtLiN9baib6ve4JDOzaPrCTRyo/8J9g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="./js/script.js"></script>
  </body>
</html>
